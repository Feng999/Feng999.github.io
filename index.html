<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>八字排盘与易经起卦</title>
  <style>
    :root {
      --color-page: #f7faf6;
      --color-surface: #ffffff;
      --color-surface-soft: #f1f6f0;
      --color-surface-tint: #fbf8ef;
      --color-ink: #26332f;
      --color-muted: #66786f;
      --color-line: #dce7df;
      --color-line-strong: #c7d8cf;
      --color-accent: #2f7d67;
      --color-accent-strong: #236e5a;
      --color-accent-soft: #dceee8;
      --color-focus: rgba(47, 125, 103, 0.18);
      --color-warn-soft: #fff3dc;
      --shadow-soft: 0 10px 28px rgba(42, 64, 54, 0.1);
      --radius-card: 8px;
      --radius-control: 8px;
      --content-width: 1180px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--color-ink);
      background:
        radial-gradient(circle at 12% 0%, rgba(255, 248, 220, 0.58), transparent 30%),
        linear-gradient(180deg, rgba(231, 242, 234, 0.88), rgba(247, 250, 246, 0.98)),
        var(--color-page);
      font-family: var(--font-sans);
      line-height: 1.5;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button,
    select,
    input {
      transition: border-color 150ms ease, box-shadow 150ms ease, background-color 150ms ease, color 150ms ease;
    }

    .app {
      width: min(100% - 40px, var(--content-width));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .app-header {
      display: grid;
      gap: 8px;
      margin-bottom: 22px;
    }

    .app-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .app-subtitle {
      max-width: 760px;
      margin: 0;
      color: var(--color-muted);
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 5px;
      margin-bottom: 16px;
      overflow-x: auto;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-control);
      box-shadow: 0 8px 22px rgba(42, 64, 54, 0.08);
    }

    .tab-button {
      position: relative;
      min-width: 0;
      min-height: 40px;
      padding: 0 16px;
      color: var(--color-muted);
      background: transparent;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 700;
    }

    .tab-button:hover {
      color: var(--color-ink);
      background: var(--color-surface-soft);
    }

    .tab-button:focus-visible {
      color: var(--color-ink);
      background: var(--color-surface-soft);
      outline: none;
      box-shadow: 0 0 0 3px var(--color-focus);
    }

    .tab-button[aria-selected="true"] {
      color: #ffffff;
      background: var(--color-accent);
      box-shadow: 0 7px 18px rgba(47, 125, 103, 0.24);
    }

    .tab-button[aria-selected="true"]::after {
      position: absolute;
      right: 14px;
      bottom: 7px;
      left: 14px;
      height: 2px;
      background: rgba(255, 255, 255, 0.78);
      border-radius: 999px;
      content: "";
    }

    .panel {
      display: none;
    }

    .panel.is-active {
      display: block;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: minmax(300px, 0.78fr) minmax(520px, 1.22fr);
      gap: 16px;
      align-items: start;
    }

    .bazi-sidebar {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .bazi-main {
      min-width: 0;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .card-header {
      padding: 16px 18px 12px;
      background: linear-gradient(180deg, rgba(251, 252, 250, 0.92), rgba(255, 255, 255, 0.92));
      border-bottom: 1px solid var(--color-line);
    }

    .card-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .card-note {
      margin: 6px 0 0;
      color: var(--color-muted);
      font-size: 13px;
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      color: var(--color-muted);
      font-size: 12px;
      font-weight: 600;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 38px;
      padding: 0 11px;
      color: var(--color-ink);
      background: #fbfcfa;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-control);
      min-width: 0;
      text-overflow: ellipsis;
    }

    .field input:hover,
    .field select:hover {
      border-color: var(--color-line-strong);
      background: #ffffff;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--color-accent);
      outline: 0;
      box-shadow: 0 0 0 3px var(--color-focus);
    }

    .status-line {
      margin: 14px 0 0;
      padding: 11px 12px;
      color: #5f4c22;
      background: var(--color-warn-soft);
      border: 1px solid #f1dca8;
      border-radius: var(--radius-card);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .status-line.is-error {
      color: #7a2724;
      background: #fff0ee;
      border-color: #f2bab4;
    }

    .status-line.is-ready {
      color: #245d4e;
      background: var(--color-accent-soft);
      border-color: #b8d8ce;
    }

    .pillar-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .pillar {
      min-width: 0;
      padding: 12px 10px;
      text-align: center;
      background: #fbfcfa;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
    }

    .pillar.is-day {
      border-color: var(--color-accent);
      background: linear-gradient(180deg, #ffffff, #f0f8f4);
      box-shadow: inset 0 0 0 2px var(--color-accent-soft), 0 8px 18px rgba(47, 125, 103, 0.11);
    }

    .pillar-label {
      color: var(--color-muted);
      font-size: 13px;
    }

    .pillar-rows {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .pillar-row {
      min-width: 0;
    }

    .pillar-row-label {
      display: block;
      margin-bottom: 3px;
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .pillar-value {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .pillar-star,
    .pillar-hidden {
      color: var(--color-ink);
      font-size: 14px;
      font-weight: 650;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .pillar-hidden {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px 5px;
      min-height: 19px;
    }

    .hidden-stem {
      white-space: nowrap;
    }

    .element-char {
      display: inline-block;
      color: var(--element-color, var(--color-ink));
    }

    .element-char + .element-char {
      margin-left: 2px;
    }

    .element-char.is-metal {
      text-shadow:
        0 1px 0 rgba(38, 49, 45, 0.58),
        0 0 1px rgba(38, 49, 45, 0.82);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .meta-item {
      min-width: 0;
      padding: 11px 12px;
      background: var(--color-surface-soft);
      border: 1px solid rgba(199, 216, 207, 0.72);
      border-radius: var(--radius-card);
    }

    .meta-label {
      display: block;
      color: var(--color-muted);
      font-size: 12px;
    }

    .meta-value {
      display: block;
      margin-top: 4px;
      font-weight: 700;
      overflow-wrap: anywhere;
      line-height: 1.42;
    }

    .element-summary {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-top: 16px;
      padding: 13px 14px;
      background: #fbfcfa;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
    }

    .element-summary-item {
      display: inline-flex;
      align-items: baseline;
      color: var(--element-color, var(--color-ink));
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .element-summary-count {
      margin-left: 1px;
      font-size: 22px;
      font-weight: 800;
    }

    .relationship-diagram {
      width: min(100%, 420px);
      margin: 0 auto;
      display: block;
    }

    .relation-node circle {
      filter: drop-shadow(0 7px 10px rgba(38, 51, 47, 0.12));
    }

    .relation-node text {
      fill: #ffffff;
      font-size: 31px;
      font-weight: 800;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    .relation-node.is-metal text {
      fill: #26332f;
    }

    .relation-arrow {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .relation-generate {
      stroke-width: 6.5;
    }

    .relation-control {
      stroke: #26332f;
      stroke-width: 4.8;
    }

    .relationship-legend {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      color: var(--color-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .relationship-legend strong {
      color: var(--color-ink);
    }

    .relation-center {
      fill: #ffffff;
      stroke: var(--color-line-strong);
      stroke-width: 2;
    }

    .relation-center-text {
      fill: var(--color-ink);
      font-size: 20px;
      font-weight: 800;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    .mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mode-pill {
      min-height: 34px;
      padding: 0 13px;
      color: var(--color-muted);
      background: #fbfcfa;
      border: 1px solid var(--color-line);
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }

    .mode-pill:hover {
      color: var(--color-ink);
      border-color: var(--color-line-strong);
      background: #ffffff;
    }

    .mode-pill:focus-visible {
      outline: 0;
      box-shadow: 0 0 0 3px var(--color-focus);
    }

    .mode-pill.is-active {
      color: #ffffff;
      background: var(--color-accent);
      border-color: var(--color-accent);
    }

    .input-section {
      display: none;
    }

    .input-section.is-active {
      display: block;
    }

    .line-select-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .hexagram-layout {
      display: grid;
      grid-template-columns: minmax(118px, 150px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .hexagram-lines {
      display: grid;
      gap: 7px;
      padding: 13px;
      background: var(--color-surface-tint);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
    }

    .hexagram-line {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      color: var(--color-ink);
      font-size: 25px;
      line-height: 1;
    }

    .hexagram-name {
      margin: 0 0 7px;
      font-size: 23px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .hexagram-copy {
      margin: 0;
      color: var(--color-muted);
      overflow-wrap: anywhere;
    }

    .plain-translation {
      margin: 7px 0 0;
      padding: 8px 10px;
      color: var(--color-ink);
      background: var(--color-surface-soft);
      border: 1px solid rgba(199, 216, 207, 0.7);
      border-radius: var(--radius-card);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .plain-translation strong {
      color: var(--color-accent-strong);
    }

    .hexagram-status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      max-width: 100%;
      padding: 0 10px;
      margin-bottom: 10px;
      color: #5f4c22;
      background: var(--color-warn-soft);
      border: 1px solid #f1dca8;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .line-text-list {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 16px 0 0;
      list-style: none;
    }

    .line-text-list li {
      padding: 9px 10px;
      background: var(--color-surface-soft);
      border: 1px solid rgba(199, 216, 207, 0.7);
      border-radius: var(--radius-card);
      color: var(--color-muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .line-text-list .line-original {
      color: var(--color-muted);
    }

    .line-text-list .plain-translation {
      margin-top: 7px;
      background: #ffffff;
      border-color: rgba(199, 216, 207, 0.9);
      color: var(--color-ink);
    }

    .change-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-top: 16px;
    }

    .change-row label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 38px;
      padding: 0 8px;
      background: #fbfcfa;
      border: 1px solid var(--color-line);
      border-radius: var(--radius-card);
      color: var(--color-muted);
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color 150ms ease, box-shadow 150ms ease, background-color 150ms ease, color 150ms ease;
    }

    .change-row label:hover {
      color: var(--color-ink);
      background: #ffffff;
      border-color: var(--color-line-strong);
    }

    .change-row label:has(input:checked) {
      color: var(--color-accent-strong);
      background: var(--color-accent-soft);
      border-color: #b8d8ce;
      font-weight: 700;
    }

    .change-row input:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .changed-hexagram {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--color-line);
    }

    .changed-hexagram.is-visible {
      display: block;
    }

    @media (max-width: 900px) {
      .app {
        width: min(100% - 28px, var(--content-width));
      }

      .panel-grid {
        grid-template-columns: 1fr;
      }

      .panel-grid > .card:first-child {
        box-shadow: 0 8px 22px rgba(42, 64, 54, 0.08);
      }

      .line-select-grid,
      .change-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .app {
        padding-top: 22px;
      }

      .app-title {
        font-size: 25px;
      }

      .form-grid,
      .meta-grid,
      .hexagram-layout {
        grid-template-columns: 1fr;
      }

      .pillar-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tabs {
        grid-template-columns: 1fr;
      }

      .line-select-grid,
      .change-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1 class="app-title">八字排盘与易经起卦</h1>
      <p class="app-subtitle">实时查看四柱、五行颜色、卦象与变卦，适合桌面和平板直接使用。</p>
    </header>

    <nav class="tabs" aria-label="功能切换">
      <button class="tab-button" type="button" id="tab-bazi" role="tab" aria-controls="panel-bazi" aria-selected="true" data-tab="bazi">
        八字排盘
      </button>
      <button class="tab-button" type="button" id="tab-iching" role="tab" aria-controls="panel-iching" aria-selected="false" data-tab="iching">
        易经起卦
      </button>
    </nav>

    <section class="panel is-active" id="panel-bazi" role="tabpanel" aria-labelledby="tab-bazi" data-panel="bazi">
      <div class="panel-grid bazi-layout">
        <div class="bazi-sidebar">
          <article class="card">
            <div class="card-header">
              <h2 class="card-title">出生信息</h2>
              <p class="card-note">按填写的公历日期和出生时间实时计算四柱。</p>
            </div>
            <div class="card-body">
              <div class="form-grid">
                <div class="field">
                  <label for="birth-date">公历日期</label>
                  <input id="birth-date" type="date" value="1990-05-16">
                </div>
                <div class="field">
                  <label for="birth-time">出生时间</label>
                  <input id="birth-time" type="time" value="09:30">
                </div>
                <div class="field">
                  <label for="gender">性别</label>
                  <select id="gender">
                    <option value="male">男</option>
                    <option value="female">女</option>
                  </select>
                </div>
                <div class="field">
                  <label for="birth-place">出生地</label>
                  <select id="birth-place">
                  </select>
                </div>
              </div>
              <p class="status-line" id="bazi-status">正在加载 lunar-typescript...</p>
            </div>
          </article>

          <article class="card">
            <div class="card-header">
              <h2 class="card-title">五行相生相克</h2>
              <p class="card-note">外圈为相生，内线为相克。</p>
            </div>
            <div class="card-body">
              <svg class="relationship-diagram" viewBox="0 0 520 460" role="img" aria-labelledby="five-element-title five-element-desc">
                <title id="five-element-title">五行相生相克关系图</title>
                <desc id="five-element-desc">金生水，水生木，木生火，火生土，土生金；金克木，木克土，土克水，水克火，火克金。</desc>
                <defs>
                  <marker id="arrow-gold" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
                    <path d="M1 1 L11 6 L1 11 Z" fill="#FFD700"></path>
                  </marker>
                  <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
                    <path d="M1 1 L11 6 L1 11 Z" fill="#2196F3"></path>
                  </marker>
                  <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
                    <path d="M1 1 L11 6 L1 11 Z" fill="#4CAF50"></path>
                  </marker>
                  <marker id="arrow-red" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
                    <path d="M1 1 L11 6 L1 11 Z" fill="#F44336"></path>
                  </marker>
                  <marker id="arrow-earth" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
                    <path d="M1 1 L11 6 L1 11 Z" fill="#A55A13"></path>
                  </marker>
                  <marker id="arrow-control" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M1 1 L11 6 L1 11 Z" fill="#26332f"></path>
                  </marker>
                </defs>

                <path class="relation-arrow relation-generate" d="M315 78 C350 87 374 106 392 132" stroke="#FFD700" marker-end="url(#arrow-gold)"></path>
                <path class="relation-arrow relation-generate" d="M416 232 C406 270 395 294 388 306" stroke="#2196F3" marker-end="url(#arrow-blue)"></path>
                <path class="relation-arrow relation-generate" d="M315 389 C278 398 246 396 219 385" stroke="#4CAF50" marker-end="url(#arrow-green)"></path>
                <path class="relation-arrow relation-generate" d="M129 328 C111 292 108 257 112 230" stroke="#F44336" marker-end="url(#arrow-red)"></path>
                <path class="relation-arrow relation-generate" d="M145 139 C165 112 184 98 202 89" stroke="#A55A13" marker-end="url(#arrow-earth)"></path>

                <path class="relation-arrow relation-control" d="M276 105 L342 303" marker-end="url(#arrow-control)"></path>
                <path class="relation-arrow relation-control" d="M315 336 L151 219" marker-end="url(#arrow-control)"></path>
                <path class="relation-arrow relation-control" d="M148 172 L366 172" marker-end="url(#arrow-control)"></path>
                <path class="relation-arrow relation-control" d="M382 203 L204 318" marker-end="url(#arrow-control)"></path>
                <path class="relation-arrow relation-control" d="M185 313 L240 111" marker-end="url(#arrow-control)"></path>

                <circle class="relation-center" cx="260" cy="220" r="37"></circle>
                <text class="relation-center-text" x="260" y="211">相生</text>
                <text class="relation-center-text" x="260" y="235">相克</text>

                <g class="relation-node is-metal">
                  <circle cx="260" cy="55" r="42" fill="#FFD700"></circle>

    // Bazi calculation delegates calendar and pillar logic to lunar-typescript.
    function getSolarFactory() {
      const namespace = window.lunarTypescriptModule || window.lunar || window.LunarTypescript || null;
      const SolarFactory = namespace?.Solar || window.Solar;
      return typeof SolarFactory?.fromYmdHms === 'function' ? SolarFactory : null;
    }

    function populateLocationPresets() {
      const select = document.querySelector('#birth-place');
      select.innerHTML = DOMESTIC_LOCATION_GROUPS
        .map((group) => {
          const options = group.cities
            .map((city) => {
              const key = toLocationKey(group.province, city);
              return `<option value="${escapeHtml(key)}">${escapeHtml(group.province)} ${escapeHtml(city)}</option>`;
            })
            .join('');
          return `<optgroup label="${escapeHtml(group.province)}">${options}</optgroup>`;
        })
        .join('');
      select.value = state.bazi.birthPlace;
    }

    function normalizeBirthInput(formState) {
      const [yearText, monthText, dayText] = formState.birthDate.split('-');
      const [hourText, minuteText] = formState.birthTime.split(':');
      const year = Number(yearText);
      const month = Number(monthText);
      const day = Number(dayText);
      const hour = Number(hourText);
      const minute = Number(minuteText);

      if (![year, month, day, hour, minute].every(Number.isInteger)) {
        throw new Error('请填写完整的公历日期和出生时间。');
      }

      const date = new Date(year, month - 1, day, hour, minute, 0);
      const isRealDate = date.getFullYear() === year
        && date.getMonth() === month - 1
        && date.getDate() === day
        && date.getHours() === hour
        && date.getMinutes() === minute;

      if (!isRealDate) {
        throw new Error('日期或时间无效，请检查输入。');
      }

      if (!LOCATION_PRESETS[formState.birthPlace]) {
        throw new Error('出生地选项无效。');
      }

      return { year, month, day, hour, minute, second: 0 };
    }

    function getTimeStrategyText(locationKey) {
      const location = LOCATION_PRESETS[locationKey] || LOCATION_PRESETS[toLocationKey('北京市', '北京市')];
      const offset = location.utcOffsetMinutes === null
        ? '按所选 IANA 时区保留，暂不换算'
        : `UTC${location.utcOffsetMinutes >= 0 ? '+' : '-'}${Math.abs(location.utcOffsetMinutes / 60)}`;

      if (location.dstPolicy === 'iana') {
        return `${location.label}。当前按用户填写的出生地当地时间直接传入 lunar-typescript，不擅自换算北京时间；夏令时策略接口已保留。`;
      }

      return `${location.label}，${offset}。当前按填写时间直接传入 lunar-typescript。`;
    }

    function formatJieQi(jieQi) {
      if (!jieQi || typeof jieQi.getName !== 'function') return '';

      const name = jieQi.getName();
      const solar = typeof jieQi.getSolar === 'function' ? jieQi.getSolar() : null;
      const timeText = solar && typeof solar.toYmdHms === 'function' ? `（${solar.toYmdHms()}）` : '';
      return `${name}${timeText}`;
    }

    function getSolarTermInfo(lunar) {
      const current = typeof lunar.getCurrentJieQi === 'function' ? lunar.getCurrentJieQi() : null;

      if (current) {
        return `当前节气：${formatJieQi(current)}`;
      }

      const prev = typeof lunar.getPrevJieQi === 'function' ? lunar.getPrevJieQi(false) : null;
      const next = typeof lunar.getNextJieQi === 'function' ? lunar.getNextJieQi(false) : null;
      const parts = [];

      if (prev) parts.push(`上一节气：${formatJieQi(prev)}`);
      if (next) parts.push(`下一节气：${formatJieQi(next)}`);

      return parts.length > 0 ? parts.join('；') : 'lunar-typescript 未返回节气信息';
    }

    function getGeneratedByElement(element) {
      return Object.entries(ELEMENT_GENERATES)
        .find(([, generated]) => generated === element)?.[0] || '';
    }

    function getControlledByElement(element) {
      return Object.entries(ELEMENT_CONTROLS)
        .find(([, controlled]) => controlled === element)?.[0] || '';
    }

    function getTenGod(dayStem, targetStem) {
      const dayMeta = STEM_META[dayStem];
      const targetMeta = STEM_META[targetStem];
      if (!dayMeta || !targetMeta) return '-';

      const isSamePolarity = dayMeta.polarity === targetMeta.polarity;
      const dayElement = dayMeta.element;
      const targetElement = targetMeta.element;

      if (targetElement === dayElement) {
        return isSamePolarity ? TEN_GOD_NAMES.friend : TEN_GOD_NAMES.robWealth;
      }

      if (ELEMENT_GENERATES[dayElement] === targetElement) {
        return isSamePolarity ? TEN_GOD_NAMES.eatingGod : TEN_GOD_NAMES.hurtingOfficer;
      }

      if (ELEMENT_CONTROLS[dayElement] === targetElement) {
        return isSamePolarity ? TEN_GOD_NAMES.indirectWealth : TEN_GOD_NAMES.directWealth;
      }

      if (ELEMENT_CONTROLS[targetElement] === dayElement) {
        return isSamePolarity ? TEN_GOD_NAMES.sevenKillings : TEN_GOD_NAMES.directOfficer;
      }

      if (ELEMENT_GENERATES[targetElement] === dayElement) {
        return isSamePolarity ? TEN_GOD_NAMES.indirectResource : TEN_GOD_NAMES.directResource;
      }

      return '-';
    }

    function buildPillar(label, value, dayStem, isDay = false) {
      const [stem = '-', branch = '-'] = [...String(value || '--')];
      return {
        label,
        stem,
        branch,
        mainStar: isDay ? '日主' : getTenGod(dayStem, stem),
        hiddenStems: BRANCH_HIDDEN_STEMS[branch] || [],
        isDay
      };
    }

    function getElementDisplay(elements) {
      return elements
        .filter(Boolean)
        .map((element) => ELEMENT_LABELS[element] || element)
        .join('、') || '-';
    }

    function getEmptyElementCounts() {
      return Object.keys(ELEMENT_LABELS).reduce((summary, element) => {
        summary[element] = 0;
        return summary;
      }, {});
    }

    function calculateBaziElementCounts(pillars) {
      const counts = getEmptyElementCounts();

      pillars.forEach((pillar) => {
        [pillar.stem, pillar.branch].forEach((char) => {
          const element = STEM_BRANCH_ELEMENT_MAP[char];
          if (element) counts[element] += 1;
        });
      });

      return counts;
    }

    function calculateElementSupport(pillars, dayElement) {
      const counts = calculateBaziElementCounts(pillars);
      const resourceElement = getGeneratedByElement(dayElement);
      const supportScore = counts[dayElement] + (counts[resourceElement] || 0);
      const pressureScore = Object.entries(counts)
        .filter(([element]) => element !== dayElement && element !== resourceElement)
        .reduce((total, [, count]) => total + count, 0);

      return { counts, resourceElement, supportScore, pressureScore };
    }

    function calculateBaziGods(pillars) {
      const dayStem = pillars.find((pillar) => pillar.isDay)?.stem;
      const dayElement = STEM_META[dayStem]?.element;

      if (!dayElement) {
        return {
          favorableGod: '-',
          usefulGod: '-',
          unfavorableGod: '-'
        };
      }

      const { resourceElement, supportScore, pressureScore } = calculateElementSupport(pillars, dayElement);
      const outputElement = ELEMENT_GENERATES[dayElement];
      const wealthElement = ELEMENT_CONTROLS[dayElement];
      const officerElement = getControlledByElement(dayElement);
      const isWeak = supportScore <= pressureScore;

      return {
        favorableGod: getElementDisplay(isWeak ? [resourceElement] : [outputElement, wealthElement]),
        usefulGod: getElementDisplay(isWeak ? [dayElement] : [officerElement]),
        unfavorableGod: getElementDisplay(isWeak ? [outputElement, wealthElement, officerElement] : [dayElement, resourceElement])
      };
    }

    function calculateBazi(formState) {
      const SolarFactory = getSolarFactory();

      if (!SolarFactory) {
        throw new Error('lunar-typescript 尚未加载成功，无法计算四柱。');
      }

      const input = normalizeBirthInput(formState);
      const solar = SolarFactory.fromYmdHms(input.year, input.month, input.day, input.hour, input.minute, input.second);
      const lunar = solar.getLunar();
      const eightChar = lunar.getEightChar();
      const dayNaYin = typeof eightChar.getDayNaYin === 'function'
        ? eightChar.getDayNaYin()
        : 'lunar-typescript 未返回日柱纳音';
      const rawPillars = {
        year: eightChar.getYear(),
        month: eightChar.getMonth(),
        day: eightChar.getDay(),
        time: eightChar.getTime()
      };
      const dayStem = [...String(rawPillars.day || '')][0];
      const pillars = [
        buildPillar('年柱', rawPillars.year, dayStem),
        buildPillar('月柱', rawPillars.month, dayStem),
        buildPillar('日柱', rawPillars.day, dayStem, true),
        buildPillar('时柱', rawPillars.time, dayStem)
      ];
      const gods = calculateBaziGods(pillars);

      return {
        pillars,
        elementCounts: calculateBaziElementCounts(pillars),
        timeStrategy: getTimeStrategyText(formState.birthPlace),
        solarTerm: getSolarTermInfo(lunar),
        dayNaYin,
        ...gods
      };
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderElementChars(value) {
      return [...String(value)].map((char) => {
        const element = STEM_BRANCH_ELEMENT_MAP[char];
        if (!element) return escapeHtml(char);

        const color = FIVE_ELEMENT_COLORS[element];
        return `<span class="element-char is-${element}" style="--element-color: ${color}">${escapeHtml(char)}</span>`;
      }).join('');
    }

    function renderHiddenStems(hiddenStems) {
      if (!hiddenStems?.length) return '-';

      return hiddenStems
        .map((stem) => `<span class="hidden-stem">${renderElementChars(stem)}</span>`)
        .join('');
    }

    function renderElementSummary(counts) {
      const safeCounts = counts || getEmptyElementCounts();
      document.querySelector('#bazi-element-summary').innerHTML = ELEMENT_SUMMARY_ORDER
        .map((element) => `
          <span class="element-summary-item" style="--element-color: ${FIVE_ELEMENT_COLORS[element]}">
            <span>${ELEMENT_LABELS[element]}</span><span class="element-summary-count">${safeCounts[element] || 0}</span>
          </span>
        `)
        .join('');
    }

    function renderBaziPillars(result) {
      const pillars = result?.pillars || [
        { label: '年柱', mainStar: '-', stem: '-', branch: '-', hiddenStems: [] },
        { label: '月柱', mainStar: '-', stem: '-', branch: '-', hiddenStems: [] },
        { label: '日柱', mainStar: '-', stem: '-', branch: '-', hiddenStems: [], isDay: true },
        { label: '时柱', mainStar: '-', stem: '-', branch: '-', hiddenStems: [] }
      ];

      document.querySelector('#bazi-pillars').innerHTML = pillars
        .map((pillar) => `
          <div class="pillar${pillar.isDay ? ' is-day' : ''}">
            <div class="pillar-label">${pillar.label}</div>
            <div class="pillar-rows">
              <div class="pillar-row">
                <span class="pillar-row-label">主星</span>
                <div class="pillar-star">${escapeHtml(pillar.mainStar)}</div>
              </div>
              <div class="pillar-row">
                <span class="pillar-row-label">天干</span>
                <div class="pillar-value">${renderElementChars(pillar.stem)}</div>
              </div>
              <div class="pillar-row">
                <span class="pillar-row-label">地支</span>
                <div class="pillar-value">${renderElementChars(pillar.branch)}</div>
              </div>
              <div class="pillar-row">
                <span class="pillar-row-label">藏干</span>
                <div class="pillar-hidden">${renderHiddenStems(pillar.hiddenStems)}</div>
              </div>
            </div>
          </div>
        `)
        .join('');
    }

    function setBaziStatus(message, type) {
      const status = document.querySelector('#bazi-status');
      status.textContent = message;
      status.classList.toggle('is-error', type === 'error');
      status.classList.toggle('is-ready', type === 'ready');
    }

    function renderBazi() {
      let result = null;

      try {
        result = calculateBazi(state.bazi);
        state.bazi.result = result;
        state.bazi.error = '';
        renderBaziPillars(result);
        renderElementSummary(result.elementCounts);
        document.querySelector('#bazi-solar-term').textContent = result.solarTerm;
        document.querySelector('#bazi-day-nayin').textContent = result.dayNaYin;
        document.querySelector('#bazi-favorable-god').textContent = result.favorableGod;
        document.querySelector('#bazi-useful-god').textContent = result.usefulGod;
        document.querySelector('#bazi-unfavorable-god').textContent = result.unfavorableGod;
        setBaziStatus('四柱已更新。', 'ready');
      } catch (error) {
        state.bazi.result = null;
        state.bazi.error = error.message;
        renderBaziPillars(null);
        renderElementSummary(null);
        document.querySelector('#bazi-solar-term').textContent = '-';
        document.querySelector('#bazi-day-nayin').textContent = '-';
        document.querySelector('#bazi-favorable-god').textContent = '-';
        document.querySelector('#bazi-useful-god').textContent = '-';
        document.querySelector('#bazi-unfavorable-god').textContent = '-';
        setBaziStatus(error.message, 'error');
      }

      return result;
    }

    // I Ching line arrays are always stored bottom-to-top.
    function trigramPairToLines(upperKey, lowerKey) {
      return [...TRIGRAMS[lowerKey].lines, ...TRIGRAMS[upperKey].lines];
    }

    function linesToTrigramKeys(linesBottomToTop) {
      const lowerLines = linesBottomToTop.slice(0, 3);
      const upperLines = linesBottomToTop.slice(3, 6);
      const lowerKey = findTrigramKeyByLines(lowerLines);
      const upperKey = findTrigramKeyByLines(upperLines);
      return { upperKey, lowerKey };
    }

    function findTrigramKeyByLines(linesBottomToTop) {
      const lineKey = linesBottomToTop.join('');
      return Object.keys(TRIGRAMS).find((key) => TRIGRAMS[key].lines.join('') === lineKey);
    }

    function getHexagramByTrigrams(upperKey, lowerKey) {
      return HEXAGRAMS[`${upperKey}_${lowerKey}`] || null;
    }

    function getHexagramByLines(linesBottomToTop) {
      const { upperKey, lowerKey } = linesToTrigramKeys(linesBottomToTop);
      return getHexagramByTrigrams(upperKey, lowerKey);
    }

    function getChangedLines(linesBottomToTop, changingIndexes) {
      return linesBottomToTop.map((line, index) => changingIndexes.includes(index) ? Number(!line) : line);
    }

    function getHexagramTitle(upperKey, lowerKey, hexagram) {
      if (hexagram) return hexagram.fullName;
      const upper = TRIGRAMS[upperKey];
      const lower = TRIGRAMS[lowerKey];
      return `${upper.nature}${lower.nature}（未找到数据）`;
    }

    function renderHexagram(container, hexagram, linesBottomToTop) {
      container.innerHTML = linesBottomToTop
        .slice()
        .reverse()
        .map((line) => `<div class="hexagram-line">${line === 1 ? '⚊' : '⚋'}</div>`)
        .join('');
    }

    function getJudgmentTranslation(hexagram) {
      if (!hexagram) return '暂无对应卦辞译文。';

      const source = hexagram.judgment || '';
      const parts = [`${hexagram.fullName}提示当前处境要顺势而行，先看清局面，再决定进退。`];

      if (source.includes('元亨') || source.includes('亨')) parts.push('整体有通达、可推进之象。');
      if (source.includes('利贞')) parts.push('适合守正，坚持原则会更有利。');
      if (source.includes('贞吉')) parts.push('保持正道可以得到吉利结果。');
      if (source.includes('吉')) parts.push('条件具备时多有吉象。');
      if (source.includes('凶')) parts.push('其中也有风险，需要谨慎处理。');
      if (source.includes('无咎')) parts.push('只要行为得当，可以避免过失。');
      if (source.includes('利涉大川')) parts.push('可以承担较大的行动或跨越障碍。');
      if (source.includes('利见大人')) parts.push('适合寻求有经验或有地位者的帮助。');
      if (source.includes('不利')) parts.push('不适合强行推进不合时宜的事。');

      return parts.join('');
    }

    function getLinePositionText(index) {
      return ['初爻', '二爻', '三爻', '四爻', '五爻', '上爻'][index] || '此爻';
    }

    function getLineTranslation(text, index) {
      const position = getLinePositionText(index);
      const parts = [`${position}提示这一阶段要结合所处位置判断行动分寸。`];

      if (text.includes('吉')) parts.push('方向较顺，按正道推进会更有利。');
      if (text.includes('凶')) parts.push('有明显风险，不宜冒进。');
      if (text.includes('无咎')) parts.push('谨慎守分，可以避免过失。');
      if (text.includes('悔亡')) parts.push('及时调整，后悔和隐患可以消除。');
      if (text.includes('厉')) parts.push('处境有压力，要保持警惕。');
      if (text.includes('利')) parts.push('有可取之处，但要选择合适方式。');
      if (text.includes('贞')) parts.push('关键在守正和稳定。');
      if (text.includes('往')) parts.push('涉及前行或行动时，要先判断时机。');
      if (text.includes('涉大川')) parts.push('可以面对较大的阻碍或转换。');

      return parts.join('');
    }

    function renderTranslation(value) {
      return `<strong>白话：</strong>${escapeHtml(value)}`;

    function renderLineTexts(list, hexagram) {
      list.innerHTML = (hexagram?.linesText || [])
        .map((text, index) => `
          <li>
            <div class="line-original">${escapeHtml(text)}</div>
            <div class="plain-translation">${renderTranslation(getLineTranslation(text, index))}</div>
          </li>

        .join('');

    function syncIChingControls() {
      document.querySelectorAll('[data-iching-mode]').forEach((button) => {
        button.classList.toggle('is-active', button.dataset.ichingMode === state.iching.mode);
      });

      document.querySelectorAll('[data-input-section]').forEach((section) => {
        section.classList.toggle('is-active', section.dataset.inputSection === state.iching.mode);
      });

      document.querySelector('#upper-trigram').value = state.iching.upperTrigram;
      document.querySelector('#lower-trigram').value = state.iching.lowerTrigram;

      document.querySelectorAll('[data-line-index]').forEach((select) => {
        select.value = String(state.iching.linesBottomToTop[Number(select.dataset.lineIndex)]);
      });

      document.querySelectorAll('[data-changing-index]').forEach((checkbox) => {
        checkbox.checked = state.iching.changingIndexes.includes(Number(checkbox.dataset.changingIndex));
      });
    }

    function renderIChing() {
      syncIChingControls();

      const { upperKey, lowerKey } = linesToTrigramKeys(state.iching.linesBottomToTop);
      const originalHexagram = getHexagramByTrigrams(upperKey, lowerKey);
      const originalTitle = getHexagramTitle(upperKey, lowerKey, originalHexagram);

      renderHexagram(document.querySelector('#original-lines'), originalHexagram, state.iching.linesBottomToTop);
      document.querySelector('#original-name').textContent = originalTitle;
      document.querySelector('#original-judgment').textContent = originalHexagram?.judgment || '未找到本卦数据';
      document.querySelector('#original-judgment-translation').innerHTML = renderTranslation(getJudgmentTranslation(originalHexagram));
      renderLineTexts(document.querySelector('#original-line-texts'), originalHexagram);

      const changedSection = document.querySelector('#changed-hexagram');
      const hasChangingLines = state.iching.changingIndexes.length > 0;
      changedSection.classList.toggle('is-visible', hasChangingLines);

      if (!hasChangingLines) return { originalHexagram, changedHexagram: null };

      const changedLines = getChangedLines(state.iching.linesBottomToTop, state.iching.changingIndexes);
      const changedKeys = linesToTrigramKeys(changedLines);
      const changedHexagram = getHexagramByTrigrams(changedKeys.upperKey, changedKeys.lowerKey);

      renderHexagram(document.querySelector('#changed-lines'), changedHexagram, changedLines);
      document.querySelector('#changed-status').textContent = changedHexagram ? '变卦' : '未找到变卦数据';
      document.querySelector('#changed-name').textContent = getHexagramTitle(changedKeys.upperKey, changedKeys.lowerKey, changedHexagram);
      document.querySelector('#changed-judgment').textContent = changedHexagram?.judgment || '未找到变卦数据';
      document.querySelector('#changed-judgment-translation').innerHTML = renderTranslation(getJudgmentTranslation(changedHexagram));

      return { originalHexagram, changedHexagram, changedLines };
    }

    // validation
    function isKnownTab(tabKey) {
      return Object.prototype.hasOwnProperty.call(TAB_KEYS, tabKey);
    }

    function validateHexagramData() {
      const entries = Object.entries(HEXAGRAMS);
      const trigramKeys = Object.keys(TRIGRAMS);
      const numbers = new Set();
      let isValid = true;

      function assertData(condition, message) {
        console.assert(condition, message);
        if (!condition) isValid = false;
      }

      assertData(entries.length === 64, 'HEXAGRAMS must contain exactly 64 items');

      entries.forEach(([key, hexagram]) => {
        const expectedKey = `${hexagram.upper}_${hexagram.lower}`;

        assertData(key === expectedKey, `${key} key must match upper_lower`);
        assertData(Number.isInteger(hexagram.number), `${key} number must be an integer`);
        assertData(!numbers.has(hexagram.number), `${key} number must be unique`);
        assertData(hexagram.number >= 1 && hexagram.number <= 64, `${key} number must be 1-64`);
        assertData(typeof hexagram.name === 'string' && hexagram.name.length > 0, `${key} name is required`);
        assertData(typeof hexagram.fullName === 'string' && hexagram.fullName.length > 0, `${key} fullName is required`);
        assertData(Object.prototype.hasOwnProperty.call(TRIGRAMS, hexagram.upper), `${key} upper must be a trigram key`);
        assertData(Object.prototype.hasOwnProperty.call(TRIGRAMS, hexagram.lower), `${key} lower must be a trigram key`);
        assertData(typeof hexagram.judgment === 'string' && hexagram.judgment.length > 0, `${key} judgment is required`);
        assertData(Array.isArray(hexagram.linesText), `${key} linesText must be an array`);
        assertData(hexagram.linesText?.length === 6, `${key} linesText must contain exactly 6 items`);
        assertData(hexagram.linesText?.every((line) => typeof line === 'string' && line.length > 0), `${key} every line text is required`);

        numbers.add(hexagram.number);
      });

      trigramKeys.forEach((upperKey) => {
        trigramKeys.forEach((lowerKey) => {
          assertData(Boolean(getHexagramByTrigrams(upperKey, lowerKey)), `${upperKey}_${lowerKey} must exist`);
        });
      });

      assertData(HEXAGRAMS.kan_kun?.fullName === '水地比', 'kan_kun.fullName must be 水地比');
      assertData(HEXAGRAMS.kun_kan?.fullName === '地水师', 'kun_kan.fullName must be 地水师');

      return isValid;
    }

    // events
    function setActiveTab(tabKey) {
      if (!isKnownTab(tabKey)) return;

      state.activeTab = tabKey;

      document.querySelectorAll('[data-tab]').forEach((button) => {
        const isSelected = button.dataset.tab === tabKey;
        button.setAttribute('aria-selected', String(isSelected));
      });

      document.querySelectorAll('[data-panel]').forEach((panel) => {
        panel.classList.toggle('is-active', panel.dataset.panel === tabKey);
      });
    }

    function bindTabs() {
      document.querySelectorAll('[data-tab]').forEach((button) => {
        button.addEventListener('click', () => setActiveTab(button.dataset.tab));
      });
    }

    function bindBaziInputs() {
      document.querySelectorAll('#panel-bazi input, #panel-bazi select').forEach((field) => {
        field.addEventListener('input', () => {
          state.bazi[field.id.replace(/-([a-z])/g, (_, letter) => letter.toUpperCase())] = field.value;
          renderBazi();
        });
      });
    }

    function bindIChingInputs() {
      document.querySelectorAll('[data-iching-mode]').forEach((button) => {
        button.addEventListener('click', () => {
          state.iching.mode = button.dataset.ichingMode;
          renderIChing();
        });
      });

      document.querySelectorAll('#upper-trigram, #lower-trigram').forEach((select) => {
        select.addEventListener('input', () => {
          state.iching.mode = 'trigrams';
          state.iching.upperTrigram = document.querySelector('#upper-trigram').value;
          state.iching.lowerTrigram = document.querySelector('#lower-trigram').value;
          state.iching.linesBottomToTop = trigramPairToLines(state.iching.upperTrigram, state.iching.lowerTrigram);
          renderIChing();
        });
      });

      document.querySelectorAll('[data-line-index]').forEach((select) => {
        select.addEventListener('input', () => {
          state.iching.mode = 'lines';
          state.iching.linesBottomToTop[Number(select.dataset.lineIndex)] = Number(select.value);
          const { upperKey, lowerKey } = linesToTrigramKeys(state.iching.linesBottomToTop);
          state.iching.upperTrigram = upperKey;
          state.iching.lowerTrigram = lowerKey;
          renderIChing();
        });
      });

      document.querySelectorAll('[data-changing-index]').forEach((checkbox) => {
        checkbox.addEventListener('input', () => {
          const index = Number(checkbox.dataset.changingIndex);
          state.iching.changingIndexes = checkbox.checked
            ? [...state.iching.changingIndexes, index].sort((a, b) => a - b)
            : state.iching.changingIndexes.filter((item) => item !== index);
          renderIChing();
        });
      });
    }

    function init() {
      populateLocationPresets();
      bindTabs();
      bindBaziInputs();
      bindIChingInputs();
      if (!validateHexagramData()) return;
      renderBazi();
      window.lunarTypescriptReady?.then(() => renderBazi());
      renderIChing();
      setActiveTab(state.activeTab);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
